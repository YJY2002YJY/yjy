<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的极简导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 40px; 
            color: #fff; 
        }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 300; font-size: 2.5rem; }
        .search-box { 
            max-width: 600px; 
            margin: 0 auto 40px; 
            position: relative;
        }
        .search-box input { 
            width: 100%; 
            padding: 15px 20px; 
            border-radius: 30px; 
            border: none; 
            font-size: 16px; 
            outline: none; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .card { 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(10px); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            transition: transform .2s, background .2s; 
            cursor: pointer; 
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card:hover { 
            transform: translateY(-5px); 
            background: rgba(255,255,255,0.25); 
        }
        .card a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 16px; 
            font-weight: 500;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            opacity: 0.7;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>🌐 我的常用导航</h1>

<div class="search-box">
    <input type="text" placeholder="🔍 搜索网站..." onkeyup="if(this.value)window.location.href='https://www.baidu.com/s?wd='+encodeURIComponent(this.value)">
</div>

<div class="grid">
    <!-- 示例书签 -->
    <div class="card"><a href="https://www.baidu.com" target="_blank">百度</a></div>
    <div class="card"><a href="https://www.bilibili.com" target="_blank">哔哩哔哩</a></div>
    <div class="card"><a href="https://github.com" target="_blank">GitHub</a></div>
    <div class="card"><a href="https://www.zhihu.com" target="_blank">知乎</a></div>
    <div class="card"><a href="https://mail.qq.com" target="_blank">QQ邮箱</a></div>
    <div class="card"><a href="https://www.google.com" target="_blank">Google</a></div>

    <!-- 👇 从这里开始，把你的书签一个个加进来 -->
    <!-- 格式：<div class="card"><a href="网址" target="_blank">网站名</a></div> -->
    <!-- 例如：<div class="card"><a href="https://www.taobao.com" target="_blank">淘宝</a></div> -->

</div>

<div class="footer">
    © 2025 我的导航站 | Made with ❤️ by YJY
</div>

</body>
</html>
